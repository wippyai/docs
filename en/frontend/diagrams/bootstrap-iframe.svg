<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 882.113 540" width="882.113" height="540" style="--bg:transparent;--fg:#374151;--line:#9ca3af;--accent:#6366f1;--muted:#6b7280;--surface:transparent;--border:#e5e7eb">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="Host" x1="74.392" y1="70" x2="74.392" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Pinia" x1="214.392" y1="70" x2="214.392" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Router" x1="354.392" y1="70" x2="354.392" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Theme" x1="498.73699999999997" y1="70" x2="498.73699999999997" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="App" x1="638.737" y1="70" x2="638.737" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="BE" x1="778.737" y1="70" x2="778.737" y2="510" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Host" data-to="Host" data-label="receive SetConfig(AppConfig)" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="74.392,90 104.392,90 104.392,110 74.392,110" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="112.392" y="100" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">receive SetConfig(AppConfig)</text>
</g>
<g class="message" data-from="Host" data-to="Pinia" data-label="init stores" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="74.392" y1="160" x2="214.392" y2="160" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="144.392" y="150" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">init stores</text>
</g>
<g class="message" data-from="Host" data-to="Router" data-label="createRouter(history mode from hostConfig)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="74.392" y1="200" x2="354.392" y2="200" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="214.392" y="190" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">createRouter(history mode from hostConfig)</text>
</g>
<g class="message" data-from="Host" data-to="Theme" data-label="inject theme-config.css, primevue.css" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="74.392" y1="240" x2="498.73699999999997" y2="240" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="286.56449999999995" y="230" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">inject theme-config.css, primevue.css</text>
</g>
<g class="message" data-from="Host" data-to="App" data-label="app.mount('#app')" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="74.392" y1="280" x2="638.737" y2="280" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="356.56449999999995" y="270" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">app.mount(&#39;#app&#39;)</text>
</g>
<g class="message" data-from="App" data-to="BE" data-label="GET /api/public/pages/routes" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="638.737" y1="320" x2="778.737" y2="320" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="708.737" y="310" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">GET /api/public/pages/routes</text>
</g>
<g class="message" data-from="BE" data-to="App" data-label="mount routes list" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="778.737" y1="360" x2="638.737" y2="360" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="708.737" y="350" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">mount routes list</text>
</g>
<g class="message" data-from="App" data-to="Router" data-label="router.addRoute() for each mount route" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="638.737" y1="400" x2="354.392" y2="400" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="496.56449999999995" y="390" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">router.addRoute() for each mount route</text>
</g>
<g class="message" data-from="App" data-to="App" data-label="resolve current URL → render page" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="638.737,440 668.737,440 668.737,460 638.737,460" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="676.737" y="450" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">resolve current URL → render page</text>
</g>
<g class="actor" data-id="Host" data-label="Web Host" data-type="participant">
  <rect x="30" y="30" width="88.78399999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="74.392" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Web Host</text>
</g>
<g class="actor" data-id="Pinia" data-label="Pinia" data-type="participant">
  <rect x="174.392" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="214.392" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Pinia</text>
</g>
<g class="actor" data-id="Router" data-label="Vue Router" data-type="participant">
  <rect x="304.4425" y="30" width="99.89900000000002" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="354.392" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Vue Router</text>
</g>
<g class="actor" data-id="Theme" data-label="Theme / CSS" data-type="participant">
  <rect x="444.3415" y="30" width="108.79099999999998" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="498.73699999999997" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Theme / CSS</text>
</g>
<g class="actor" data-id="App" data-label="Vue App" data-type="participant">
  <rect x="596.9385" y="30" width="83.59700000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="638.737" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Vue App</text>
</g>
<g class="actor" data-id="BE" data-label="Wippy BE" data-type="participant">
  <rect x="733.6039999999999" y="30" width="90.266" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="778.737" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Wippy BE</text>
</g>
</svg>