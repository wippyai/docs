<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 801.9335 455" width="801.9335" height="455" style="--bg:transparent;--fg:#374151;--line:#9ca3af;--accent:#6366f1;--muted:#6b7280;--surface:transparent;--border:#e5e7eb">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="ChildApp" x1="145.884" y1="70" x2="145.884" y2="425" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="ProxyJS" x1="294.67499999999995" y1="70" x2="294.67499999999995" y2="425" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="WebHost" x1="434.67499999999995" y1="70" x2="434.67499999999995" y2="425" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="HostRouter" x1="574.675" y1="70" x2="574.675" y2="425" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="ChildRouter" x1="719.02" y1="70" x2="719.02" y2="425" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="ChildApp" data-to="ChildRouter" data-label="router.push('/new-path')" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="145.884" y1="90" x2="719.02" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="432.452" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">router.push(&#39;/new-path&#39;)</text>
</g>
<g class="message" data-from="ChildRouter" data-to="ChildApp" data-label="router.afterEach fires" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="719.02" y1="130" x2="145.884" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="432.452" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">router.afterEach fires</text>
</g>
<g class="message" data-from="ChildApp" data-to="ProxyJS" data-label="host.onRouteChanged('/new-path', title)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="145.884" y1="170" x2="294.67499999999995" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="220.27949999999998" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">host.onRouteChanged(&#39;/new-path&#39;, title)</text>
</g>
<g class="message" data-from="ProxyJS" data-to="WebHost" data-label="PostMessage: CmdRouteChanged" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="294.67499999999995" y1="210" x2="434.67499999999995" y2="210" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="364.67499999999995" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">PostMessage: CmdRouteChanged</text>
</g>
<g class="message" data-from="WebHost" data-to="HostRouter" data-label="router.push('/mountpath/new-path')" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="434.67499999999995" y1="250" x2="574.675" y2="250" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="504.67499999999995" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">router.push(&#39;/mountpath/new-path&#39;)</text>
</g>
<g class="message" data-from="HostRouter" data-to="WebHost" data-label="URL bar updated" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="574.675" y1="290" x2="434.67499999999995" y2="290" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="504.67499999999995" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">URL bar updated</text>
</g>
<g class="message" data-from="WebHost" data-to="ProxyJS" data-label="PostMessage: UrlWasUpdatedInParent" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="434.67499999999995" y1="330" x2="294.67499999999995" y2="330" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="364.67499999999995" y="320" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">PostMessage: UrlWasUpdatedInParent</text>
</g>
<g class="message" data-from="ProxyJS" data-to="ChildApp" data-label="on('@history') event fires" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="294.67499999999995" y1="370" x2="145.884" y2="370" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="220.27949999999998" y="360" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">on(&#39;@history&#39;) event fires</text>
</g>
<g class="note" data-position="over" data-actors="ChildApp">
  <polygon points="30,378 255.76799999999997,378 261.768,384 261.768,401 30,401" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="255.76799999999997,378 261.768,384 255.76799999999997,384" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="145.884" y="389.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)"><tspan x="145.884" dy="-3.3000000000000007">Child router stays in sync</tspan><tspan x="145.884" dy="14.3">with host URL bar</tspan></text>
</g>
<g class="actor" data-id="ChildApp" data-label="Child App (iframe)" data-type="participant">
  <rect x="78.52099999999999" y="30" width="134.726" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="145.884" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Child App (iframe)</text>
</g>
<g class="actor" data-id="ProxyJS" data-label="proxy.js" data-type="participant">
  <rect x="253.24699999999996" y="30" width="82.856" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="294.67499999999995" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">proxy.js</text>
</g>
<g class="actor" data-id="WebHost" data-label="Web Host" data-type="participant">
  <rect x="390.28299999999996" y="30" width="88.78399999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="434.67499999999995" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Web Host</text>
</g>
<g class="actor" data-id="HostRouter" data-label="Host Router" data-type="participant">
  <rect x="523.2434999999999" y="30" width="102.863" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="574.675" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Host Router</text>
</g>
<g class="actor" data-id="ChildRouter" data-label="Child Router" data-type="participant">
  <rect x="666.1065" y="30" width="105.827" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="719.02" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Child Router</text>
</g>
</svg>