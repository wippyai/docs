  <text x="239.8555" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">module.js (CDN)</text>
</g>
<g class="actor" data-id="App" data-label="Vue App" data-type="participant">
  <rect x="342.40200000000004" y="30" width="83.59700000000001" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="384.20050000000003" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Vue App</text>
</g>
</svg>