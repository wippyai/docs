<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 455.999 295" width="455.999" height="295" style="--bg:transparent;--fg:#374151;--line:#9ca3af;--accent:#6366f1;--muted:#6b7280;--surface:transparent;--border:#e5e7eb">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="Parent" x1="83.65450000000001" y1="70" x2="83.65450000000001" y2="265" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Module" x1="239.8555" y1="70" x2="239.8555" y2="265" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="App" x1="384.20050000000003" y1="70" x2="384.20050000000003" y2="265" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Parent" data-to="Module" data-label="&lt;script src=&quot;.../module.js&quot;&gt;" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="83.65450000000001" y1="90" x2="239.8555" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="161.755" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">&lt;script src=&quot;.../module.js&quot;&gt;</text>
</g>
<g class="message" data-from="Parent" data-to="Module" data-label="initWippyApp(AppConfig, container)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="83.65450000000001" y1="130" x2="239.8555" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="161.755" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">initWippyApp(AppConfig, container)</text>
</g>
<g class="message" data-from="Module" data-to="App" data-label="init Pinia, Router, Theme" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="239.8555" y1="185" x2="384.20050000000003" y2="185" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="312.028" y="175" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">init Pinia, Router, Theme</text>
</g>
<g class="message" data-from="Module" data-to="App" data-label="app.mount(container)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="239.8555" y1="225" x2="384.20050000000003" y2="225" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="312.028" y="215" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">app.mount(container)</text>
</g>
<g class="note" data-position="over" data-actors="Module">
  <polygon points="82.09450000000004,138 391.6165,138 397.6165,144 397.6165,161 82.09450000000004,161" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="391.6165,138 397.6165,144 391.6165,144" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="239.8555" y="149.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)"><tspan x="239.8555" dy="-3.3000000000000007">No PostMessage handshake needed</tspan><tspan x="239.8555" dy="14.3">config provided directly</tspan></text>
</g>
