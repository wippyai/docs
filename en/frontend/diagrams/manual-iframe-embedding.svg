</g>
<g class="message" data-from="Iframe" data-to="Iframe" data-label="initialize with AppConfig (isolated, partial-page)" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="684.102,305 714.102,305 714.102,325 684.102,325" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
