  <text x="199.04699999999994" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)"><tspan x="199.04699999999994" dy="-3.9000000000000012">Your page</tspan><tspan x="199.04699999999994" dy="16.900000000000002">(manual embed)</tspan></text>
</g>
<g class="actor" data-id="FacadeAPI" data-label="/facade/config
(Wippy BE)" data-type="participant">
  <rect x="335.30899999999997" y="30" width="188.078" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="429.34799999999996" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)"><tspan x="429.34799999999996" dy="-3.9000000000000012">/facade/config</tspan><tspan x="429.34799999999996" dy="16.900000000000002">(Wippy BE)</tspan></text>
</g>
<g class="actor" data-id="Iframe" data-label="iframe.html
(?waitForCustomConfig)" data-type="participant">
