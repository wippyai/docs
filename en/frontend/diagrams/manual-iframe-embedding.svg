<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 974.9979999999999 405" width="974.9979999999999" height="405" style="--bg:transparent;--fg:#374151;--line:#9ca3af;--accent:#6366f1;--muted:#6b7280;--surface:transparent;--border:#e5e7eb">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="Parent" x1="199.04699999999994" y1="70" x2="199.04699999999994" y2="375" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="FacadeAPI" x1="429.34799999999996" y1="70" x2="429.34799999999996" y2="375" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Iframe" x1="684.102" y1="70" x2="684.102" y2="375" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Parent" data-to="FacadeAPI" data-label="GET /facade/config" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="199.04699999999994" y1="90" x2="429.34799999999996" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="314.19749999999993" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">GET /facade/config</text>
</g>
<g class="message" data-from="FacadeAPI" data-to="Parent" data-label="{ iframe_url, iframe_origin, ...AppConfig }" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="429.34799999999996" y1="130" x2="199.04699999999994" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="314.19749999999993" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">{ iframe_url, iframe_origin, ...AppConfig }</text>
</g>
<g class="message" data-from="Parent" data-to="Iframe" data-label="create &lt;iframe src=iframe_url&gt;" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="199.04699999999994" y1="170" x2="684.102" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="441.57449999999994" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">create &lt;iframe src=iframe_url&gt;</text>
</g>
<g class="message" data-from="Iframe" data-to="Parent" data-label="postMessage { type:'@gen2-chat', action:'get-config' }" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="684.102" y1="225" x2="199.04699999999994" y2="225" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="441.57449999999994" y="215" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">postMessage { type:&#39;@gen2-chat&#39;, action:&#39;get-config&#39; }</text>
</g>
