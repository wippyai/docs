</g>
<g class="note" data-position="over" data-actors="Parent">
  <polygon points="30,178 362.0939999999999,178 368.0939999999999,184 368.0939999999999,201 30,201" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="362.0939999999999,178 368.0939999999999,184 362.0939999999999,184" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="199.04699999999994" y="189.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)"><tspan x="199.04699999999994" dy="-3.3000000000000007">addEventListener(&#39;message&#39;, …)</tspan><tspan x="199.04699999999994" dy="14.3">waiting for the @gen2-chat request</tspan></text>
</g>
