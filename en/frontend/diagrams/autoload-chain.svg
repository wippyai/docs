  <text x="633.4979999999998" y="342.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)"><tspan x="633.4979999999998" dy="-3.3000000000000007">Components now available</tspan><tspan x="633.4979999999998" dy="14.3">as custom HTML elements</tspan></text>
</g>
