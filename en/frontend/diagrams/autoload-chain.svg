<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1089.9579999999999 408" width="1089.9579999999999" height="408" style="--bg:transparent;--fg:#374151;--line:#9ca3af;--accent:#6366f1;--muted:#6b7280;--surface:transparent;--border:#e5e7eb">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<g class="block" data-type="loop" data-label="for each auto_register component">
  <rect x="439.1059999999999" y="173" width="421.2869999999999" height="140" rx="0" ry="0" fill="none" stroke="var(--_node-stroke)" stroke-width="1" />
  <rect x="439.1059999999999" y="173" width="223.56999999999996" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="445.1059999999999" y="182" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">loop [for each auto_register component]</text>
</g>
<line class="lifeline" data-actor="Views" x1="104.773" y1="70" x2="104.773" y2="378" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="API" x1="314.3259999999999" y1="70" x2="314.3259999999999" y2="378" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="WebHost" x1="493.4979999999999" y1="70" x2="493.4979999999999" y2="378" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="DOM" x1="633.4979999999998" y1="70" x2="633.4979999999998" y2="378" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="CE" x1="785.9939999999998" y1="70" x2="785.9939999999998" y2="378" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="WebHost" data-to="API" data-label="GET /api/public/components/list" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="493.4979999999999" y1="90" x2="314.3259999999999" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="403.9119999999999" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">GET /api/public/components/list</text>
</g>
<g class="message" data-from="API" data-to="WebHost" data-label="[{tag_name, entry_point, url, auto_register}]" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="314.3259999999999" y1="145" x2="493.4979999999999" y2="145" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="403.9119999999999" y="135" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">[{tag_name, entry_point, url, auto_register}]</text>
</g>
<g class="message" data-from="WebHost" data-to="DOM" data-label="inject &lt;script type=&quot;module&quot; src=&quot;entry_point?declare-tag=tag_name&quot;&gt;" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="493.4979999999999" y1="213" x2="633.4979999999998" y2="213" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="563.4979999999998" y="203" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">inject &lt;script type=&quot;module&quot; src=&quot;entry_point?declare-tag=tag_name&quot;&gt;</text>
</g>
<g class="message" data-from="DOM" data-to="CE" data-label="define(import.meta.url, ElementClass)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="633.4979999999998" y1="253" x2="785.9939999999998" y2="253" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="709.7459999999999" y="243" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">define(import.meta.url, ElementClass)</text>
</g>
<g class="message" data-from="CE" data-to="CE" data-label="customElements.define(tag_name, ElementClass)" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="785.9939999999998,293 815.9939999999998,293 815.9939999999998,313 785.9939999999998,313" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="823.9939999999998" y="303" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">customElements.define(tag_name, ElementClass)</text>
</g>
<g class="note" data-position="over" data-actors="API">
  <polygon points="242.39799999999988,98 380.2539999999999,98 386.2539999999999,104 386.2539999999999,121 242.39799999999988,121" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="380.2539999999999,98 386.2539999999999,104 380.2539999999999,104" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="314.3259999999999" y="109.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">filters: announced == true</text>
</g>
