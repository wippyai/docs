<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080.8735 430" width="1080.8735" height="430" style="--bg:transparent;--fg:#374151;--line:#9ca3af;--accent:#6366f1;--muted:#6b7280;--surface:transparent;--border:#e5e7eb">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="Browser" x1="72.91" y1="70" x2="72.91" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Facade" x1="258.01" y1="70" x2="258.01" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="FacadeAPI" x1="494.239" y1="70" x2="494.239" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="Host" x1="786.4134999999999" y1="70" x2="786.4134999999999" y2="400" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Browser" data-to="Facade" data-label="GET /" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="72.91" y1="90" x2="258.01" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="165.45999999999998" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">GET /</text>
</g>
<g class="message" data-from="Facade" data-to="Browser" data-label="HTML page with &lt;script src=&quot;.../module.js&quot;&gt;" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="258.01" y1="130" x2="72.91" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="165.45999999999998" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">HTML page with &lt;script src=&quot;.../module.js&quot;&gt;</text>
</g>
<g class="message" data-from="Browser" data-to="Host" data-label="load JS module (registers window.initWippyApp)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="72.91" y1="170" x2="786.4134999999999" y2="170" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="429.6617499999999" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">load JS module (registers window.initWippyApp)</text>
</g>
<g class="message" data-from="Browser" data-to="FacadeAPI" data-label="GET /facade/config" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="72.91" y1="210" x2="494.239" y2="210" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="283.5745" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">GET /facade/config</text>
</g>
<g class="message" data-from="FacadeAPI" data-to="Browser" data-label="AppConfig JSON (auth, env, theming, hostConfig, context)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="494.239" y1="250" x2="72.91" y2="250" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="283.5745" y="240" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">AppConfig JSON (auth, env, theming, hostConfig, context)</text>
</g>
<g class="message" data-from="Browser" data-to="Host" data-label="window.initWippyApp(config, '#app')" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="72.91" y1="290" x2="786.4134999999999" y2="290" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="429.6617499999999" y="280" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">window.initWippyApp(config, &#39;#app&#39;)</text>
</g>
<g class="message" data-from="Host" data-to="Host" data-label="take over page + browser history, render shell" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="786.4134999999999,330 816.4134999999999,330 816.4134999999999,350 786.4134999999999,350" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="824.4134999999999" y="340" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">take over page + browser history, render shell</text>
</g>
<g class="actor" data-id="Browser" data-label="Browser" data-type="participant">
  <rect x="30" y="30" width="85.82" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="72.91" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Browser</text>
</g>
<g class="actor" data-id="Facade" data-label="Facade page
(wippy/facade)" data-type="participant">
  <rect x="155.82" y="30" width="204.37999999999997" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="258.01" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)"><tspan x="258.01" dy="-3.9000000000000012">Facade page</tspan><tspan x="258.01" dy="16.900000000000002">(wippy/facade)</tspan></text>
</g>
<g class="actor" data-id="FacadeAPI" data-label="/facade/config
(Wippy BE)" data-type="participant">
  <rect x="400.2" y="30" width="188.078" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="494.239" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)"><tspan x="494.239" dy="-3.9000000000000012">/facade/config</tspan><tspan x="494.239" dy="16.900000000000002">(Wippy BE)</tspan></text>
</g>
<g class="actor" data-id="Host" data-label="Web Host module
(module.js / managed-layout.js)" data-type="participant">
  <rect x="628.2779999999999" y="30" width="316.2709999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="786.4134999999999" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)"><tspan x="786.4134999999999" dy="-3.9000000000000012">Web Host module</tspan><tspan x="786.4134999999999" dy="16.900000000000002">(module.js / managed-layout.js)</tspan></text>
</g>
</svg>