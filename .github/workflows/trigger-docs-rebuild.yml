name: Trigger wippy.ai rebuild

# On every commit landing on main, notify the docs engine at wippy.ai so it
# re-syncs github.com/wippyai/docs@main and rebuilds the site live (no image
# rebuild or redeploy needed). The engine verifies the HMAC-SHA256 signature
# with its WEBHOOK_SECRET; the same value must be set as a repository Actions
# secret named WEBHOOK_SECRET.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rebuild:
    name: Notify docs engine
    runs-on: ubuntu-latest
    env:
      WEBHOOK_URL: https://wippy.ai/webhook/github
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
    steps:
      - name: Send signed push event
        run: |
          set -euo pipefail
          if [ -z "$WEBHOOK_SECRET" ]; then
            echo "::error::WEBHOOK_SECRET repository secret is not set"
            exit 1
          fi

          # The engine verifies X-Hub-Signature-256 over the exact request body;
          # it does not parse the JSON, so a small descriptor is enough.
          jq -n --arg ref "$GITHUB_REF" --arg sha "$GITHUB_SHA" \
            '{triggered_by:"github-actions", ref:$ref, sha:$sha}' > /tmp/body.json

          sig="$(openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" /tmp/body.json | awk '{print $NF}')"

          code="$(curl -sS -o /tmp/resp -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            -H 'X-GitHub-Event: push' \
            -H "X-Hub-Signature-256: sha256=$sig" \
            --data-binary @/tmp/body.json \
            "$WEBHOOK_URL")"

          echo "HTTP $code"
          cat /tmp/resp; echo

          if [ "$code" != "202" ]; then
            echo "::error::docs engine did not accept the rebuild (expected 202, got $code)"
            exit 1
          fi
